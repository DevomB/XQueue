services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postwave
      POSTGRES_PASSWORD: postwave
      POSTGRES_DB: postwave
    ports:
      - "5432:5432"
    volumes:
      - postwave_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - postwave_redis:/data

volumes:
  postwave_pg:
  postwave_redis:
