services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xqueue
      POSTGRES_PASSWORD: xqueue
      POSTGRES_DB: xqueue
    ports:
      - "5432:5432"
    volumes:
      - xqueue_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - xqueue_redis:/data

volumes:
  xqueue_pg:
  xqueue_redis:
