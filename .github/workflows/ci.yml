name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build shared
        run: pnpm --filter @postwave/shared build

      - name: Build core
        run: pnpm --filter @postwave/core build

      - name: Build storage-sqlite
        run: pnpm --filter @postwave/storage-sqlite build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          TOKEN_ENCRYPTION_KEY: dGVzdC1rZXktMzJieXRzLWJhc2U2NC1wYWQ=

      - name: Build CLI
        run: pnpm --filter @postwave/cli build

      - name: Build worker
        run: pnpm --filter @postwave/worker build

      - name: Build web
        run: pnpm --filter @postwave/web build

      - name: Build desktop
        run: pnpm --filter @postwave/desktop build

      - name: Install Playwright browsers
        run: pnpm --filter @postwave/web exec playwright install chromium

      - name: Marketing E2E
        run: pnpm --filter @postwave/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
